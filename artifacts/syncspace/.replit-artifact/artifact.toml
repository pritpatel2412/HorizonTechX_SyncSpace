kind = "web"
previewPath = "/"
title = "SyncSpace"
version = "1.0.0"
id = "artifacts/syncspace"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20029

[services.development]
run = "pnpm --filter @workspace/syncspace run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/syncspace", "run", "build" ]
publicDir = "artifacts/syncspace/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20029"
BASE_PATH = "/"
